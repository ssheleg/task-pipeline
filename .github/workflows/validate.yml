name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Structural validator
        run: python3 test/validate.py

      - name: Negative self-test (validator must be able to fail)
        run: |
          set -eu
          cp -R . /tmp/corrupt-copy
          # corrupt the version so marketplace/plugin/CHANGELOG drift
          sed -i 's/"version": "[0-9.]*"/"version": "0.0.0-corrupt"/' \
            /tmp/corrupt-copy/plugins/task-pipeline/.claude-plugin/plugin.json
          if python3 /tmp/corrupt-copy/test/validate.py; then
            echo "ERROR: validator passed on a corrupted copy — it cannot fail"
            exit 1
          else
            echo "OK: validator correctly FAILs on corrupted copy"
          fi

      - name: install.sh syntax check
        run: bash -n install.sh

      - name: npm installer CLI check
        run: node --check bin/task-pipeline.js

      - name: npm installer functional test (fresh / rerun-skip / --force)
        run: |
          set -eu
          export HOME=/tmp/fakehome
          mkdir -p "$HOME"
          node bin/task-pipeline.js
          test -f "$HOME/.claude/skills/task-pipeline/SKILL.md"
          test -f "$HOME/.claude/commands/task-pipeline.md"
          node bin/task-pipeline.js | grep -q '^skip:'
          node bin/task-pipeline.js --force | grep -q '^Installed'
          if node bin/task-pipeline.js --wat; then
            echo "ERROR: unknown arg accepted"; exit 1
          fi
          echo "OK: npm installer behaves"
